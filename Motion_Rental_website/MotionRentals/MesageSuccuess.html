<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url('biker-407123_1920.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .confirmation-box {
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #ff758c;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            background-color: #ff758c;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1.2em;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #ff4c6c;
        }
    </style>
</head>
<body>
    <div class="confirmation-box">
        <h1>Your message has been sent successfully!</h1>
        <p>Thank you for choosing MotionRentals – we appreciate your business and wish you a great ride!</p>
        <a href="home.html">Back to Home</a>
    </div>
</body>
</html>
