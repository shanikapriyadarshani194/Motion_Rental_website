<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Page - Welcome to MotionRentals</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url('luxury.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        form {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.2);
        }

        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
            color: #ff758c;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1em;
            background-color: #f9f9f9;
            box-shadow: inset 0px 2px 5px rgba(0, 0, 0, 0.1);
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border: 1px solid #ff758c;
            box-shadow: 0px 0px 8px rgba(255, 117, 140, 0.5);
        }
        

        button {
            background-color: #ff758c;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            display: block;
            margin: 20px auto 0;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s ease, transform 0.2s;
        }

        button:hover {
            background-color: #ff4c6c;
            transform: translateY(-3px);
        }
        .back-button {
            display: block;
            margin: 20px auto;
            background-color: #ff758c;
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 15px 30px;
            width: 200px;
            border-radius: 5px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s ease-in-out, transform 0.2s;
        }

        .back-button:hover {
            background-color: #ff4c6c;
            transform: scale(1.1);
        }

       
        @media (max-width: 768px) {
            form {
                padding: 20px;
            }

            button {
                font-size: 1em;
            }
            
        }
        
    </style>
</head>
<body>
    <h1>Place Your Order</h1>
    <form action="order-success.html" method="POST">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email address" required>

        <label for="item">Item Name:</label>
        <select id="item" name="item" required>
            <option value="Toyota Axio">Toyota Axio - Rs.5500</option>
            <option value="Honda Vezel">Honda Vezel - Rs.6500</option>
            <option value="Suzuki Wagon R">Suzuki Wagon R - Rs.4500</option>
            <option value="Nissan X-Trail">Nissan X-Trail - Rs.7500</option>
            <option value="Toyota Prius">Toyota Prius - Rs.9500</option>
        </select>

        <label for="address">Delivery Address:</label>
        <textarea id="address" name="address" rows="4" placeholder="Enter your delivery address" required></textarea>

        <button type="submit">Submit Order</button>
        <a href="home.html" class="back-button">Back</a>
    </form>
</body>
<script src="carorderscripts.js"></script>
</html>
